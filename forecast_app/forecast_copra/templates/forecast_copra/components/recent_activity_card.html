<!-- ===================== RECENT ACTIVITY CARD COMPONENT ===================== -->
<div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
    <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
        <h3 class="text-base font-bold text-slate-950">Recent Activity</h3>
        <a href="{% url 'recent_forecasts' %}" class="text-xs font-semibold text-slate-600 hover:text-slate-950 underline">
            View All ↗
        </a>
    </div>

    <div class="space-y-3">
        {% for forecast in recent_forecasts %}
        <div class="p-3.5 rounded-lg bg-slate-50 border border-slate-100 flex justify-between items-center hover:bg-slate-100/80 transition-colors">
            <div>
                <p class="text-xs text-slate-500 font-mono">{{ forecast.created_at|date:"M d, g:i A" }}</p>
                <p class="text-lg font-bold text-slate-950 mt-0.5">
                    ₱{{ forecast.price_predicted|floatformat:2 }}
                </p>
            </div>
            <span class="inline-flex items-center rounded-md bg-slate-200/60 px-2 py-1 text-[11px] font-bold text-slate-700 uppercase">
                {{ forecast.forecast_horizon }} Days
            </span>
        </div>
        {% empty %}
        <div class="text-center text-slate-500 py-8 text-sm">
            No recent simulation logs.
        </div>
        {% endfor %}
    </div>
</div>
